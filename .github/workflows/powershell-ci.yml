name: PowerShell CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run Pester tests
      shell: pwsh
      run: Invoke-Pester -Path ./tests -Output Detailed
