name: PowerShell CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run Pester tests
      shell: pwsh
      run: |
        $ModulePath = Resolve-Path "pacwin.psm1"
        $PesterPath = Resolve-Path "tests/modules/Pester"
        $env:PSModulePath = "$PesterPath;$env:PSModulePath"
        Import-Module Pester -Force
        Invoke-Pester -Path ./tests -Data @{ ModulePath = $ModulePath.Path } -Output Detailed
