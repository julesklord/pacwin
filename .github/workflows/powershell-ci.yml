name: PowerShell CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run Pester tests
      shell: pwsh
      run: |
        $pesterPath = Resolve-Path "./tests/modules/Pester"
        $env:PSModulePath = "$pesterPath;$env:PSModulePath"
        Import-Module Pester -Force -MinimumVersion 5.0
        Invoke-Pester -Path ./tests -Output Detailed
