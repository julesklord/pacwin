<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Framing (Industrial Context) -->
  <path d="M 40 40 L 20 40 L 20 60 M 160 160 L 180 160 L 180 140" stroke="#FF2400" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- GHOST BODY (TropicalDev Pitahaya Red) -->
  <path d="M 50 100
           A 50 50 0 0 1 150 100
           V 140
           L 135 130 L 120 145 L 105 130 L 90 145 L 75 130 L 60 145 L 50 135
           Z" fill="#FF2400"/>

  <!-- EYES (Industrial Style) -->
  <!-- Left Eye -->
  <rect x="75" y="80" width="18" height="18" fill="white"/>
  <rect x="85" y="85" width="8" height="8" fill="#0D1017"/>

  <!-- Right Eye -->
  <rect x="115" y="80" width="18" height="18" fill="white"/>
  <rect x="125" y="85" width="8" height="8" fill="#0D1017"/>

  <!-- TERMINAL ACCENT (Blinking Cursor) -->
  <rect x="50" y="160" width="100" height="4" fill="#FF2400">
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite" />
  </rect>
</svg>
